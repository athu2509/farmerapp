<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
  <h2 style="margin:0">Users</h2>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>person_add</mat-icon> Add User
  </button>
</div>

<mat-card *ngIf="showForm" style="margin-bottom:24px; padding:24px">
  <h3 style="margin-top:0">{{ editingUser ? 'Edit User' : 'New User' }}</h3>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
        <mat-error *ngIf="form.get('name')?.hasError('required')">Required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" />
        <mat-error *ngIf="form.get('email')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>{{ editingUser ? 'New Password (leave blank to keep)' : 'Password' }}</mat-label>
        <input matInput formControlName="password" type="password" />
        <mat-error *ngIf="form.get('password')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 characters</mat-error>
      </mat-form-field>
    </div>

    <div style="display:flex; gap:12px; margin-top:8px">
      <button mat-raised-button color="primary" type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : (editingUser ? 'Update' : 'Create') }}
      </button>
      <button mat-button type="button" (click)="closeForm()">Cancel</button>
    </div>
  </form>
</mat-card>

<mat-card>
  <table mat-table [dataSource]="dataSource" style="width:100%">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>

    <ng-container matColumnDef="roles">
      <th mat-header-cell *matHeaderCellDef>Roles</th>
      <td mat-cell *matCellDef="let row">
        <span
          *ngFor="let role of row.roles"
          style="display:inline-block; margin-right:6px; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600"
          [style.background]="role === 'SUPER_USER' ? '#fce4ec' : role === 'ADMIN' ? '#e3f2fd' : '#f3e5f5'"
          [style.color]="role === 'SUPER_USER' ? '#c62828' : role === 'ADMIN' ? '#1565c0' : '#6a1b9a'"
        >
          {{ role }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button (click)="openEdit(row)" title="Edit">
          <mat-icon>edit</mat-icon>
        </button>

        <mat-form-field
          *ngIf="isSuperUser() && canManageRole(row)"
          appearance="outline"
          style="width:120px; margin:0 8px"
        >
          <mat-select
            [value]="getUserRole(row)"
            (selectionChange)="onRoleChange(row, $event.value)"
          >
            <mat-option *ngFor="let opt of roleOptions" [value]="opt.value">
              {{ opt.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <button
          mat-stroked-button
          *ngIf="!isSuperUser() && isAdmin() && canManageRole(row) && getUserRole(row) === 'USER'"
          (click)="makeAdmin(row)"
          style="margin-right:8px"
        >
          Make Admin
        </button>

        <button
          mat-icon-button
          color="warn"
          *ngIf="canDeleteUser(row)"
          (click)="delete(row)"
          title="Delete"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="dataSource.data.length === 0" style="text-align:center; padding:32px; color:#999">
    No users found.
  </p>
</mat-card>
