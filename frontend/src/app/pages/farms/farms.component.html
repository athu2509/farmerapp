<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px">
  <button mat-icon-button routerLink="/farmers" title="Back">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <h2 style="margin:0">Farms — {{ farmerName }}</h2>
  <span style="flex:1"></span>
  <button mat-raised-button color="primary" *ngIf="auth.isAdmin()" (click)="openCreate()">
    <mat-icon>add</mat-icon> Add Farm
  </button>
</div>

<mat-card *ngIf="showForm" style="margin-bottom:24px; padding:24px">
  <h3 style="margin-top:0">{{ editingFarm ? 'Edit Farm' : 'New Farm' }}</h3>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <formly-form [form]="form" [fields]="fields" [model]="model"></formly-form>
    <div style="display:flex; gap:12px; margin-top:8px">
      <button mat-raised-button color="primary" type="submit" [disabled]="loading">
        {{ loading ? 'Saving...' : (editingFarm ? 'Update' : 'Create') }}
      </button>
      <button mat-button type="button" (click)="closeForm()">Cancel</button>
    </div>
  </form>
</mat-card>

<mat-card>
  <table mat-table [dataSource]="dataSource" style="width:100%">
    <ng-container matColumnDef="village">
      <th mat-header-cell *matHeaderCellDef>Village</th>
      <td mat-cell *matCellDef="let row">{{ row.village }}</td>
    </ng-container>
    <ng-container matColumnDef="crop_name">
      <th mat-header-cell *matHeaderCellDef>Crop</th>
      <td mat-cell *matCellDef="let row">{{ row.crop_name }}</td>
    </ng-container>
    <ng-container matColumnDef="area">
      <th mat-header-cell *matHeaderCellDef>Area</th>
      <td mat-cell *matCellDef="let row">{{ row.area }}</td>
    </ng-container>
    <ng-container matColumnDef="sowing_date">
      <th mat-header-cell *matHeaderCellDef>Sowing Date</th>
      <td mat-cell *matCellDef="let row">{{ row.sowing_date }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <button mat-icon-button [routerLink]="['/farms', row.id, 'schedules']" title="View Schedules">
          <mat-icon>calendar_month</mat-icon>
        </button>
        <ng-container *ngIf="auth.isAdmin()">
          <button mat-icon-button (click)="openEdit(row)" title="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(row)" title="Delete">
            <mat-icon>delete</mat-icon>
          </button>
        </ng-container>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  <p *ngIf="dataSource.data.length === 0" style="text-align:center; padding:32px; color:#999">
    No farms found for this farmer.
  </p>
</mat-card>
