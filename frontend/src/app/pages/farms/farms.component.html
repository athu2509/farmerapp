<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px">
  <button mat-icon-button routerLink="/farmers">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <div>
    <h2 style="font-size:18px; font-weight:500; margin:0">Farms</h2>
    <p style="font-size:13px; color:#888; margin:2px 0 0">{{ farmerName }}</p>
  </div>
  <span style="flex:1"></span>
  <button mat-raised-button color="primary" *ngIf="auth.isAdmin()" (click)="openCreate()">
    <mat-icon>add</mat-icon> Add farm
  </button>
</div>

<mat-card>
  <table mat-table [dataSource]="dataSource" style="width:100%">
    <ng-container matColumnDef="village">
      <th mat-header-cell *matHeaderCellDef>Village</th>
      <td mat-cell *matCellDef="let row">{{ row.village }}</td>
    </ng-container>
    <ng-container matColumnDef="crop_name">
      <th mat-header-cell *matHeaderCellDef>Crop</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.crop_name }}</td>
    </ng-container>
    <ng-container matColumnDef="area">
      <th mat-header-cell *matHeaderCellDef>Area</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.area }}</td>
    </ng-container>
    <ng-container matColumnDef="sowing_date">
      <th mat-header-cell *matHeaderCellDef>Sowing date</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.sowing_date }}</td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <div style="display:flex; gap:6px; align-items:center">
          <button class="action-btn btn-view" [routerLink]="['/farms', row.id, 'schedules']">
            <mat-icon style="font-size:14px; height:14px; width:14px">calendar_month</mat-icon> Schedules
          </button>
          <ng-container *ngIf="auth.isAdmin()">
            <button class="action-btn btn-edit" (click)="openEdit(row)">
              <mat-icon style="font-size:14px; height:14px; width:14px">edit</mat-icon> Edit
            </button>
            <button class="action-btn btn-del" (click)="delete(row)">
              <mat-icon style="font-size:14px; height:14px; width:14px">delete</mat-icon> Delete
            </button>
          </ng-container>
        </div>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <p *ngIf="dataSource.data.length === 0" style="text-align:center; padding:40px; color:#999">
    No farms found for this farmer.
  </p>
</mat-card>
