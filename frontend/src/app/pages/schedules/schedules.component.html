<div style="display:flex; align-items:center; gap:12px; margin-bottom:20px">
  <button mat-icon-button [routerLink]="['/farmers', farmInfo?.farmer_id, 'farms']">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <div>
    <h2 style="font-size:18px; font-weight:500; margin:0">Schedules</h2>
    <p style="font-size:13px; color:#888; margin:2px 0 0" *ngIf="farmInfo">
      {{ farmInfo.crop_name }} · {{ farmInfo.village }} · Sown {{ farmInfo.sowing_date }}
    </p>
  </div>
  <span style="flex:1"></span>
  <button mat-raised-button color="primary" *ngIf="auth.isAdmin()" (click)="openCreate()">
    <mat-icon>add</mat-icon> Add schedule
  </button>
</div>

<mat-card>
  <table mat-table [dataSource]="dataSource" style="width:100%">
    <ng-container matColumnDef="task_name">
      <th mat-header-cell *matHeaderCellDef>Task</th>
      <td mat-cell *matCellDef="let row">{{ row.task_name }}</td>
    </ng-container>
    <ng-container matColumnDef="fertilizer">
      <th mat-header-cell *matHeaderCellDef>Fertilizer</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.fertilizer }}</td>
    </ng-container>
    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Quantity</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.quantity }} {{ row.quantity_unit }}</td>
    </ng-container>
    <ng-container matColumnDef="due_date">
      <th mat-header-cell *matHeaderCellDef>Due date</th>
      <td mat-cell *matCellDef="let row" style="color:#888">{{ row.due_date }}</td>
    </ng-container>
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <span class="badge"
          [style.background]="row.status === 'completed' ? '#EAF3DE' : '#FAEEDA'"
          [style.color]="row.status === 'completed' ? '#3B6D11' : '#854F0B'">
          {{ row.status }}
        </span>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let row">
        <div style="display:flex; gap:6px; align-items:center" *ngIf="auth.isAdmin()">
          <button class="action-btn"
            [style.background]="row.status === 'pending' ? '#EAF3DE' : '#FAEEDA'"
            [style.color]="row.status === 'pending' ? '#3B6D11' : '#854F0B'"
            (click)="updateStatus(row, row.status === 'pending' ? 'completed' : 'pending')">
            <mat-icon style="font-size:14px; height:14px; width:14px">
              {{ row.status === 'pending' ? 'check_circle' : 'radio_button_unchecked' }}
            </mat-icon>
            {{ row.status === 'pending' ? 'Complete' : 'Reopen' }}
          </button>
          <button class="action-btn btn-edit" (click)="openEdit(row)">
            <mat-icon style="font-size:14px; height:14px; width:14px">edit</mat-icon> Edit
          </button>
          <button class="action-btn btn-del" (click)="delete(row)">
            <mat-icon style="font-size:14px; height:14px; width:14px">delete</mat-icon> Delete
          </button>
        </div>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
  <p *ngIf="dataSource.data.length === 0" style="text-align:center; padding:40px; color:#999">
    No schedules found for this farm.
  </p>
</mat-card>
